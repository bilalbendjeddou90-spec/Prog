<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>1M DA — Suivi quotidien</title>
<style>
  :root{
    --bg:#0b0f14;
    --card:#0f1720;
    --muted:#94a3b8;
    --accent:#16a34a;
    --btn:#374151;
    --glass: rgba(255,255,255,0.03);
  }
  html,body{height:100%;margin:0;font-family:Inter, ui-sans-serif, system-ui, -apple-system, 'Helvetica Neue', Arial;}
  body{background:var(--bg);color:#e6eef6;display:flex;align-items:flex-start;justify-content:center;padding:20px;}
  .app{width:100%;max-width:1100px;}
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
  h1{margin:0;font-size:20px;}
  .muted{color:var(--muted);font-size:13px;}
  .card{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));padding:14px;border-radius:12px;margin-bottom:14px;box-shadow:0 6px 20px rgba(2,6,23,0.6);border:1px solid rgba(255,255,255,0.02);}
  .row{display:flex;gap:12px;align-items:center;}
  .right{text-align:right;}
  .big{font-size:20px;font-weight:700;}
  .small{font-size:13px;color:var(--muted);}
  .progress-wrap{margin-top:10px;}
  .progress{height:12px;background:#0b1220;border-radius:999px;overflow:hidden;border:1px solid rgba(255,255,255,0.02);}
  .progress > .bar{height:100%;width:0%;background:linear-gradient(90deg,#22c55e,#16a34a);transition:width 400ms ease;}
  .controls{margin-top:10px;display:flex;flex-wrap:wrap;gap:8px;}
  button{background:var(--btn);color:#e6eef6;border:0;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:13px;}
  button.positive{background:#065f46}
  button.warn{background:#b91c1c}
  .grid{display:grid;grid-template-columns:repeat(1,1fr);gap:8px;margin-top:10px;}
  @media(min-width:900px){ .grid{grid-template-columns:repeat(3,1fr);} }
  .day{display:flex;justify-content:space-between;align-items:center;padding:10px;background:var(--card);border-radius:8px;border:1px solid rgba(255,255,255,0.02);}
  .day .date{font-size:13px;color:var(--muted);}
  .day .amount{font-size:13px;}
  input[type=checkbox]{width:18px;height:18px;}
  footer{color:var(--muted);font-size:12px;text-align:center;margin-top:12px;}
  .topline{display:flex;gap:12px;align-items:center;}
  .pill{background:var(--glass);padding:6px 8px;border-radius:999px;font-size:13px;color:var(--muted);}
  .centered{display:flex;align-items:center;gap:10px;}
</style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>1M DA — Suivi quotidien</h1>
        <div class="muted">Début : 02/03/2026 • Gain fixe : 3 500 DA / jour</div>
      </div>
      <div class="right">
        <div class="small">Solde actuel</div>
        <div class="big" id="balance">-- DA</div>
        <div class="small">Objectif : 1 000 000 DA</div>
      </div>
    </header>

    <section class="card">
      <div class="row" style="justify-content:space-between;align-items:center;">
        <div>
          <div class="small">Progression</div>
          <div style="font-weight:700;font-size:18px;" id="percent">--%</div>
        </div>
        <div class="small" id="daysInfo">Jours complétés : -- / --</div>
      </div>

      <div class="progress-wrap">
        <div class="progress"><div class="bar" id="bar"></div></div>
      </div>

      <div class="controls">
        <button id="markToday" class="positive">✅ Marquer aujourd'hui</button>
        <button id="exportCSV">⬇️ Export CSV</button>
        <button id="reset" class="warn">Réinitialiser</button>
      </div>
    </section>

    <section class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div>
          <div class="small">Motivation du jour</div>
          <div style="font-weight:600;margin-top:6px;" id="motivation">—</div>
        </div>
        <div class="small" id="endDate">Date de fin estimée : --</div>
      </div>
    </section>

    <section class="card">
      <div class="grid" id="daysGrid">
        <!-- days go here -->
      </div>
    </section>

    <footer>Affiché : solde basé sur les jours cochés. Données stockées localement sur ton appareil.</footer>
  </div>

<script>
(function(){
  // SETTINGS
  const START_BALANCE = 550000;
  const DAILY_GAIN = 3500;
  const TARGET = 1000000;
  const START_DATE = new Date(2026, 2, 2); // March 2, 2026 (month 2)
  const KEY = 'goal_1M_da_completed_v1_html';
  const messages = [
    'Chaque jour compte — continue comme ça !',
    'Ton objectif se rapproche : garde le cap.',
    'Petits pas, grand résultat.',
    'Bravo — acte quotidien, richesse future.',
    'Rappelle-toi pourquoi tu as commencé.'
  ];

  // computed
  const amountRemaining = TARGET - START_BALANCE;
  const TOTAL_DAYS = Math.ceil(amountRemaining / DAILY_GAIN); // 129 approx
  const lastDay = new Date(START_DATE); lastDay.setDate(lastDay.getDate() + TOTAL_DAYS - 1);

  // state
  let completed = new Set();
  try{
    const raw = localStorage.getItem(KEY);
    if(raw){ JSON.parse(raw).forEach(i=>completed.add(Number(i))); }
  }catch(e){ console.warn(e); completed = new Set(); }

  // helpers
  function fmt(n){ return n.toLocaleString('fr-FR') + ' DA'; }
  function fmtDate(d){
    return d.toLocaleDateString('fr-FR', {day:'2-digit',month:'2-digit',year:'numeric'});
  }

  // elements
  const bar = document.getElementById('bar');
  const balanceEl = document.getElementById('balance');
  const percentEl = document.getElementById('percent');
  const daysInfo = document.getElementById('daysInfo');
  const daysGrid = document.getElementById('daysGrid');
  const motivation = document.getElementById('motivation');
  const endDate = document.getElementById('endDate');

  function calculate(){
    const completedCount = completed.size;
    const currentBalance = START_BALANCE + completedCount * DAILY_GAIN;
    const percent = Math.min(100, Math.round((currentBalance / TARGET) * 10000) / 100);
    const remaining = Math.max(0, TARGET - currentBalance);
    const remainingDays = Math.ceil(remaining / DAILY_GAIN);
    return { completedCount, currentBalance, percent, remaining, remainingDays };
  }

  function save(){
    try{ localStorage.setItem(KEY, JSON.stringify(Array.from(completed))); }catch(e){}
  }

  function render(){
    const { completedCount, currentBalance, percent, remainingDays } = calculate();
    balanceEl.textContent = currentBalance.toLocaleString('fr-FR') + ' DA';
    percentEl.textContent = percent + '%';
    daysInfo.textContent = 'Jours complétés : ' + completedCount + ' / ' + TOTAL_DAYS + ' • Jours restants estimés : ' + remainingDays;
    bar.style.width = percent + '%';
    motivation.textContent = messages[completedCount % messages.length];
    endDate.textContent = 'Date de fin estimée : ' + fmtDate(lastDay);
    // render grid
    daysGrid.innerHTML = '';
    for(let i=0;i<TOTAL_DAYS;i++){
      const d = new Date(START_DATE); d.setDate(d.getDate() + i);
      const checked = completed.has(i);
      const div = document.createElement('div');
      div.className = 'day';
      div.innerHTML = `<div><div style="font-weight:600">Jour ${i+1}</div><div class="date">${fmtDate(d)}</div></div>
        <div class="centered"><div class="amount">${fmt(START_BALANCE + (i+1)*DAILY_GAIN)}</div>
        <input type="checkbox" aria-label="jour-${i+1}" data-index="${i}" ${checked ? 'checked' : ''}></div>`;
      daysGrid.appendChild(div);
    }
    // attach listeners to checkboxes
    daysGrid.querySelectorAll('input[type=checkbox]').forEach(cb=>{
      cb.addEventListener('change', (e)=>{
        const idx = Number(e.target.dataset.index);
        if(e.target.checked) completed.add(idx); else completed.delete(idx);
        save(); render();
      });
    });
  }

  // controls
  document.getElementById('markToday').addEventListener('click', ()=>{
    const now = new Date();
    const idx = Array.from({length:TOTAL_DAYS}, (_,i)=>{
      const dd = new Date(START_DATE); dd.setDate(dd.getDate()+i);
      return {i, dd};
    }).find(x => x.dd.getFullYear() === now.getFullYear() && x.dd.getMonth() === now.getMonth() && x.dd.getDate() === now.getDate());
    if(!idx){ alert(\"La date d'aujourd'hui n'est pas dans la période du plan (02/03/2026 → \" + fmtDate(lastDay) + \").\"); return; }
    if(completed.has(idx.i)) completed.delete(idx.i); else completed.add(idx.i);
    save(); render();
  });

  document.getElementById('reset').addEventListener('click', ()=>{
    if(!confirm('Réinitialiser toutes les cases cochées ?')) return;
    completed = new Set(); save(); render();
  });

  document.getElementById('exportCSV').addEventListener('click', ()=>{
    // build csv
    let cumul = START_BALANCE;
    let csv = 'index,date,checked,gain,cumul\\n';
    for(let i=0;i<TOTAL_DAYS;i++){
      const d = new Date(START_DATE); d.setDate(d.getDate()+i);
      const checked = completed.has(i) ? 1 : 0;
      if(checked) cumul += DAILY_GAIN;
      csv += (i+1) + ',' + fmtDate(d) + ',' + checked + ',' + DAILY_GAIN + ',' + cumul + '\\n';
    }
    const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = '1M_DA_progress.csv'; document.body.appendChild(a); a.click();
    a.remove(); URL.revokeObjectURL(url);
  });

  // initial render
  render();

})();
</script>
</body>
</html>
